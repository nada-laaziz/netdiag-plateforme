<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NetDiag - Connexion</title>
    <!-- On relie le fichier CSS qu'on va créer juste après -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="login-container">
        <div class="hero-illustration">
            <svg width="120" height="70" viewBox="0 0 120 70">
                <line x1="60" y1="35" x2="20" y2="15" stroke="#93c5fd" stroke-width="2"/>
                <line x1="60" y1="35" x2="100" y2="15" stroke="#93c5fd" stroke-width="2"/>
                <line x1="60" y1="35" x2="20" y2="55" stroke="#93c5fd" stroke-width="2"/>
                <line x1="60" y1="35" x2="100" y2="55" stroke="#93c5fd" stroke-width="2"/>
                <circle class="noeud" cx="60" cy="35" r="10" fill="#3b82f6"/>
                <circle class="noeud" cx="20" cy="15" r="6" fill="#60a5fa"/>
                <circle class="noeud" cx="100" cy="15" r="6" fill="#60a5fa"/>
                <circle class="noeud" cx="20" cy="55" r="6" fill="#60a5fa"/>
                <circle class="noeud" cx="100" cy="55" r="6" fill="#60a5fa"/>
            </svg>
        </div>
        <h1>NetDiag</h1>

        <!-- Le formulaire de connexion -->
        <form method="POST" action="/login">
            
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Se connecter</button>
        </form>
        <p style="text-align:center; margin-top:15px;">
            <a href="{{ url_for('register') }}">Pas encore de compte ? S'inscrire</a>
        </p>
    </div>

</body>
</html>
