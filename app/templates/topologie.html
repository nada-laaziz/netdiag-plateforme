<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NetDiag - Topologie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="page-container">
        <div class="topbar">
            <h1>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="12" y1="12" x2="4" y2="6"/><line x1="12" y1="12" x2="20" y2="6"/><line x1="12" y1="12" x2="4" y2="18"/><line x1="12" y1="12" x2="20" y2="18"/></svg>
                Topologie — {{ projet.nom }}
            </h1>
            <a href="{{ url_for('logout') }}">Déconnexion</a>
        </div>

        <p><a href="{{ url_for('equipements_projet', id_projet=projet.id) }}">← Retour aux équipements</a></p>

        {% if equipements_positions %}
        <svg width="600" height="500" style="background:white; border:1px solid #ddd; border-radius:6px;">

            <circle cx="300" cy="250" r="12" fill="#2c3e50" />
            <text x="300" y="278" text-anchor="middle" font-size="12" fill="#2c3e50">Réseau</text>

            {% for eq in equipements_positions %}
                <line x1="300" y1="250" x2="{{ eq.x }}" y2="{{ eq.y }}" stroke="#aaa" stroke-width="1" />

                <rect x="{{ eq.x - 50 }}" y="{{ eq.y - 20 }}" width="100" height="40" rx="6" fill="#eaf1fb" stroke="#378ADD" />
                <text x="{{ eq.x }}" y="{{ eq.y - 3 }}" text-anchor="middle" font-size="11" fill="#0c447c">{{ eq.nom }}</text>
                <text x="{{ eq.x }}" y="{{ eq.y + 12 }}" text-anchor="middle" font-size="10" fill="#5f5e5a">{{ eq.ip }}</text>
            {% endfor %}

        </svg>
        {% else %}
            <p>Aucun équipement à afficher. Ajoutez des équipements d'abord.</p>
        {% endif %}
    </div>

</body>
</html>
